<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="联系 LONMA DYNAMIC，提交车辆信息与改装目标。" />
    <title>Contact | LONMA DYNAMIC</title>
    <link rel="stylesheet" href="../styles.css?v=page-header-20260705" />
    <link rel="stylesheet" href="../layout-canvas.css?v=canvas-20260719-1900" />
    <link rel="stylesheet" href="../content-pages.css?v=workshop-process-20260718b" />
  </head>
  <body class="content-body" data-section="contact">
    <main class="site-shell content-page contact-page" aria-label="LONMA DYNAMIC 联系页面">
      <header class="topbar">
        <a class="brand" href="../index.html" aria-label="回到首页" data-zh-aria-label="回到首页" data-en-aria-label="Back to home">LONMA DYNAMIC</a>
        <nav class="nav" aria-label="主导航" data-zh-aria-label="主导航" data-en-aria-label="Main navigation">
          <a href="./about.html">ABOUT</a>
          <a href="./services.html">SERVICES</a>
          <a href="./cases.html">CASES</a>
          <a href="./contact.html" aria-current="page">CONTACT</a>
        </nav>
        <div class="top-actions">
          <button class="lang-toggle" type="button" aria-label="Switch to English">
            <span class="lang-option" data-lang-option="zh">中</span>
            <span class="lang-separator" aria-hidden="true">/</span>
            <span class="lang-option" data-lang-option="en">EN</span>
          </button>
        </div>
      </header>

      <section class="content-hero contact-hero" aria-labelledby="contact-title">
        <div class="content-hero-media" aria-hidden="true">
          <img src="../assets/images/网页/optimized/case-06.jpg" alt="" />
        </div>
        <div class="content-hero-shade" aria-hidden="true"></div>
        <div class="content-hero-copy">
          <p class="content-eyebrow">CONTACT <span>01</span></p>
          <h1 class="content-display" id="contact-title">START WITH THE CAR.</h1>
          <p
            class="content-local-title"
            data-zh="先告诉我们车辆和你真正想改变的部分"
            data-en="TELL US ABOUT THE CAR AND WHAT YOU ACTUALLY WANT TO CHANGE"
          >
            先告诉我们车辆和你真正想改变的部分
          </p>
          <span class="content-accent-line" aria-hidden="true"></span>
        </div>
      </section>

      <section class="contact-inquiry" aria-labelledby="inquiry-title">
        <div class="contact-intro">
          <p class="content-eyebrow">PROJECT INQUIRY</p>
          <h2 id="inquiry-title" data-zh="从目标开始，不从零件清单开始。" data-en="START WITH THE GOAL, NOT A PARTS LIST.">
            从目标开始，不从零件清单开始。
          </h2>
          <p
            data-zh="提供基本车辆信息、你现在遇到的问题，以及希望车辆最终呈现的状态。我们会从合适的方向继续沟通。"
            data-en="Share the car, the problem you are solving, and the final state you want. We will continue with the direction that makes sense."
          >
            提供基本车辆信息、你现在遇到的问题，以及希望车辆最终呈现的状态。我们会从合适的方向继续沟通。
          </p>
          <a class="contact-email" href="mailto:hello@lonmadynamic.com">hello@lonmadynamic.com</a>
        </div>

        <form class="contact-form" data-contact-form>
          <label class="contact-field">
            <span data-zh="你的称呼" data-en="YOUR NAME">你的称呼</span>
            <input
              type="text"
              name="name"
              autocomplete="name"
              required
              data-zh-placeholder="姓名或称呼"
              data-en-placeholder="Name"
              placeholder="姓名或称呼"
            />
          </label>
          <label class="contact-field">
            <span data-zh="电子邮箱" data-en="EMAIL">电子邮箱</span>
            <input
              type="email"
              name="email"
              autocomplete="email"
              required
              data-zh-placeholder="你的邮箱"
              data-en-placeholder="Email address"
              placeholder="你的邮箱"
            />
          </label>
          <label class="contact-field contact-field-wide">
            <span data-zh="车辆信息" data-en="VEHICLE">车辆信息</span>
            <input
              type="text"
              name="vehicle"
              required
              data-zh-placeholder="品牌 / 车型 / 年份"
              data-en-placeholder="Make / model / year"
              placeholder="品牌 / 车型 / 年份"
            />
          </label>
          <label class="contact-field contact-field-wide">
            <span data-zh="咨询方向" data-en="SERVICE">咨询方向</span>
            <select name="service" required>
              <option value="" data-zh="请选择" data-en="Select a service">请选择</option>
              <option value="Build" data-zh="汽车改装" data-en="Vehicle build">汽车改装</option>
              <option value="Parts" data-zh="汽车配件" data-en="Performance parts">汽车配件</option>
              <option value="Photo" data-zh="汽车摄影" data-en="Automotive media">汽车摄影</option>
              <option value="ECU" data-zh="ECU 特调" data-en="ECU calibration">ECU 特调</option>
              <option value="Chassis" data-zh="底盘设定" data-en="Chassis setup">底盘设定</option>
              <option value="Exhaust" data-zh="进排气" data-en="Intake / exhaust">进排气</option>
            </select>
          </label>
          <label class="contact-field contact-field-wide">
            <span data-zh="你想改变什么" data-en="WHAT SHOULD CHANGE">你想改变什么</span>
            <textarea
              name="message"
              rows="5"
              required
              data-zh-placeholder="描述现在的状态、使用场景与目标"
              data-en-placeholder="Describe the current state, use, and goal"
              placeholder="描述现在的状态、使用场景与目标"
            ></textarea>
          </label>
          <div class="contact-submit-row">
            <p data-contact-status aria-live="polite"></p>
            <button type="submit">
              <span data-zh="发送项目需求" data-en="SEND PROJECT REQUEST">发送项目需求</span>
              <span aria-hidden="true">→</span>
            </button>
          </div>
        </form>
      </section>

      <footer class="content-footer">
        <span>LONMA DYNAMIC</span>
        <span data-zh="龙马态度 · 2026" data-en="AUTOMOTIVE ATTITUDE · 2026">龙马态度 · 2026</span>
        <a href="./cases.html" data-zh="查看案例 →" data-en="VIEW CASE FILES →">查看案例 →</a>
      </footer>
    </main>
    <script src="../content-pages.js?v=workshop-process-20260718"></script>
  </body>
</html>
